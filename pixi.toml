[workspace]
name = "cond-beverly-boulevard"
version = "0.1.0"
description = "Extração de dados de demonstrativos PDF"
channels = ["conda-forge"]
platforms = ["win-64"]

[dependencies]
python = ">=3.11"
openpyxl = "*"
pip = ">=26.0.1,<27"

[pypi-dependencies]
google-genai = "*"
plotly = "*"

[tasks]
scan = { cmd = "python scan_gemini.py && python -c \"import shutil; shutil.copy('demonstrativos.html', 'docs/index.html')\"", description = "Extract data from images and generate Excel + HTML dashboard" }
deploy = { cmd = "pixi run scan && git add . && git commit -m \"Update dashboard\" && git push", description = "Run scan and deploy to GitHub Pages" }

